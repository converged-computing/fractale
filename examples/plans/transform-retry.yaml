name: "Transform Jobspec from Flux to Slurm"
steps:
   # The persona generates the Dockerfile
  - name: transform
    type: prompt
    prompt: transform_jobspec_expert
    allow_tools: false

    # Inputs that can be passed forward to next steps
    inputs:
      from_manager: slurm
      to_manager: flux
      script: |
        #!/bin/bash                                                                                                          │
        #SBATCH --nodes=1                                                                                                    │
        #SBATCH --ntasks=64                                                                                                  │
        #SBATCH --time=00:01:40                                                                                              │
        #SBATCH --cpu-bind=cores                                                                                             │
        #SBATCH --partition=pbatch                                                                                           │
        #SBATCH --container-image=ghcr.io/converged-computing/lammps-reax:ubuntu22.04                                        │
        #SBATCH --output=job.%j.out                                                                                          │
        #SBATCH --error=job.%j.err                                                                                           │
        #SBATCH --job-name=lammps 
        lmp -v x 8 -v y 8 -v z 8 -in in.reaxc.hns -nocite

    # This is the simplest case. The prompt above should generate
    # the input, and the agent SHOULD call a tool for transform.
    # We don't have a slurm validate, but when we flip to Slurm
    # to flux we can validate.
    transitions:
      failed: transform
      success: validate
    
    # Fail and try again if we don't get a jobspec
    rules:
      failed: [not jobspec]

   # The persona provides the jobspec and asks for the translation
   # In this case we will call the transform (manual) endpoint explicitly
  - name: validate
    type: prompt
    prompt: validate_jobspec_expert

    # This gets jobspec from the function call output above.
    inputs:
      script: "{{steps.transform.outputs.jobspec}}"

    # If we succeed, proceed to manual validation
    transitions:
      failed: transform
      success: validate_manual

  - name: validate_manual
    type: tool
    tool: flux_validate_jobspec
    inputs:
      content: "{{steps.transform.outputs.jobspec}}"

    # If we fail, go back to transform and add error
    # We succeed when valid in the return data structure is True
    transitions:
      failed: transform
    rules:
      success: [valid]