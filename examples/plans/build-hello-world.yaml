name: "LAMMPS Build"
steps:
  - name: ask_question_agent
    type: agent
    inputs: 
      goal: You are a Dockerfile build agent. Build a container hello-world with an ubuntu:2404 base that says "Hello World." You MUST choose a tool to build the dockerfile and verify success with the build_container tool endpoint.
    rules:
      success: [returncode == 0]
    transitions:
      failure: generate