name: "LAMMPS Build"
steps:
  - name: ask
    type: agent
    inputs:
      goal: |
         You are a Dockerfile build agent. Build a container for LAMMPS called ghcr.io/converged-computing/lammps:latest with an ubuntu:24.04 base.
         You MUST choose a tool to build the dockerfile and verify success with the build_container tool endpoint.
    rules:
      success: [returncode == 0]
    transitions:
      failed: generate